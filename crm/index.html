<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SalesPilot CRM PRO</title>
<style>
:root{--navy:#0f1c34;--navy2:#152744;--blue:#3568f4;--bg:#f4f6fa;--card:#fff;--text:#182238;--muted:#70809a;--line:#dfe5ef;--green:#18a875;--red:#e5485d;--amber:#e6a52f;--shadow:0 10px 30px rgba(24,34,56,.08)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.app{min-height:100vh;display:grid;grid-template-columns:245px 1fr}.side{background:linear-gradient(180deg,var(--navy),#0b162b);color:#fff;padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:11px;align-items:center;padding:4px 8px 22px}.logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#4e7cff,#24b0ff);display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:15px}.brand span{display:block;font-size:10px;color:#9fb0ca;margin-top:2px}.nav{display:grid;gap:7px}.nav button{border:0;background:transparent;color:#b8c5d8;border-radius:12px;padding:12px 13px;text-align:left;font-weight:800;font-size:12px;display:flex;gap:10px;align-items:center;cursor:pointer}.nav button i{width:22px;text-align:center;font-style:normal}.nav button.active,.nav button:hover{background:#223a60;color:#fff}.side-foot{margin-top:24px;padding:14px 10px;border-top:1px solid rgba(255,255,255,.1);font-size:10px;color:#8799b7;line-height:1.7}.main{padding:25px;min-width:0}.top{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:18px}.top h1{margin:0;font-size:27px}.sub{color:var(--muted);font-size:11px;line-height:1.65}.top-actions{display:flex;gap:8px}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;font-size:11px;font-weight:800;cursor:pointer}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.ghost{background:#fff}.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(4,1fr)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.kpi{padding:17px}.kpi span{display:block;color:var(--muted);font-size:10px}.kpi strong{display:block;font-size:24px;margin-top:6px}.kpi small{font-size:10px;color:var(--muted)}.panel{padding:17px}.panel-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:13px}.panel-head h2,.panel-head h3{margin:0;font-size:15px}.two{grid-template-columns:1.4fr .9fr}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:720px}.table th,.table td{padding:11px 9px;border-bottom:1px solid var(--line);font-size:11px;text-align:left}.table th{font-size:9px;color:var(--muted);background:#f8fafc}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:9px;font-weight:900}.blue{background:#e9efff;color:#2959e8}.green{background:#e8f8f2;color:#087f5b}.amber{background:#fff4dc;color:#a76a00}.red{background:#ffe9ed;color:#bf2d43}.view{display:none}.view.active{display:block}.alertbar{background:#fff5e8;border:1px solid #efd5ae;border-radius:14px;padding:13px 15px;display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;font-size:11px}.pipeline{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:10px;overflow:auto}.lane{background:#eef2f7;border-radius:14px;padding:10px;min-height:420px}.lane h3{font-size:11px;margin:0 0 10px}.deal{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:0 5px 15px rgba(20,40,70,.05);cursor:pointer}.deal b{font-size:11px}.deal p{font-size:9px;color:var(--muted);line-height:1.5}.profile{padding:18px}.profile h2{margin:0}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;font-size:9px;font-weight:800;margin-bottom:5px;color:var(--muted)}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;background:#fff}.field textarea{min-height:85px}.full{grid-column:1/-1}.toast{position:fixed;right:18px;bottom:18px;background:#12213d;color:#fff;padding:12px 16px;border-radius:11px;opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s;z-index:80;font-size:11px}.toast.show{opacity:1;transform:none}.diag-kpi{position:relative;overflow:hidden}.diag-kpi:after{content:"";position:absolute;right:-22px;bottom:-28px;width:92px;height:92px;border-radius:50%;background:rgba(53,104,244,.08)}.diag-layout{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(360px,.95fr);gap:16px}.diag-list{display:grid;gap:10px}.diag-row{border:1px solid var(--line);border-radius:15px;padding:14px;background:#fff;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.diag-row.unread{border-color:#bfd0ff;background:#f7f9ff;box-shadow:0 8px 22px rgba(53,104,244,.08)}.diag-row h3{font-size:14px;margin:0 0 5px}.diag-row p{margin:0;color:var(--muted);font-size:11px;line-height:1.6}.diag-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.diag-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.diag-actions button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 9px;font-size:10px;font-weight:800}.diag-actions .primary-mini{background:var(--blue);color:#fff;border-color:var(--blue)}.diag-detail{padding:20px;position:sticky;top:18px;align-self:start}.diag-summary{background:linear-gradient(135deg,#13213b,#244fd2);color:#fff;border-radius:17px;padding:17px;margin:14px 0}.diag-summary small{color:#cbd8ff}.diag-summary strong{display:block;font-size:23px;margin:7px 0 3px}.axis-mini{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.axis-chip{background:#f7f9fc;border:1px solid var(--line);border-radius:11px;padding:10px}.axis-chip span{display:block;font-size:9px;color:var(--muted)}.axis-chip b{font-size:15px}.diag-section{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.diag-section h3{font-size:12px;margin:0 0 8px}.diag-section p,.diag-section li{font-size:11px;line-height:1.7;color:#46536a}.prompt-box{white-space:pre-wrap;background:#0e1930;color:#dbe5ff;border-radius:13px;padding:14px;font-size:10px;line-height:1.65;max-height:310px;overflow:auto}.diag-toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}.status-select{border:1px solid var(--line);border-radius:9px;padding:8px;background:#fff;font-size:11px}.source-badge{background:#eaf9f4;color:#087f5b}.deadline-badge{background:#fff0f2;color:var(--red)}.integration-box{background:#f8fafc;border:1px dashed #b9c5d9;border-radius:14px;padding:14px;margin-top:14px}.integration-box input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;margin-top:7px}.empty{padding:35px;text-align:center;color:var(--muted)}
@media(max-width:1050px){.two,.diag-layout{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.diag-detail{position:relative;top:auto}}
@media(max-width:780px){body{overflow-x:hidden}.app{display:block;min-height:100svh}.side{position:sticky;top:0;z-index:45;height:auto;min-height:0;padding:10px 10px 8px;box-shadow:0 10px 28px rgba(5,15,32,.24)}.brand{padding:0 4px 9px}.logo{width:36px;height:36px}.nav{display:flex;gap:7px;overflow-x:auto;padding:1px 1px 4px;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}.nav button{flex:0 0 88px;min-height:58px;padding:7px 5px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;text-align:center;font-size:10px;white-space:normal}.nav button i{font-size:18px}.side-foot{display:none}.main{padding:17px 12px 42px}.top{flex-direction:column;align-items:stretch}.top h1{font-size:24px}.top-actions{display:grid;grid-template-columns:1fr 1fr}.btn{min-height:44px}.kpis{grid-template-columns:1fr 1fr}.diag-actions{display:grid;grid-template-columns:1fr 1fr;width:100%}.diag-row{grid-template-columns:1fr}.axis-mini{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="brand"><div class="logo">SP</div><div><b>SalesPilot CRM</b><span>診断連携版</span></div></div><nav class="nav" aria-label="主要メニュー"><button type="button" class="active" data-view="dashboard"><i>🏠</i><span>ホーム</span></button><button type="button" data-view="diagnoses"><i>🩺</i><span>診断相談</span></button><button type="button" data-view="customers"><i>👥</i><span>顧客・商談</span></button><button type="button" data-view="pipeline"><i>📋</i><span>進捗管理</span></button><button type="button" data-view="detail"><i>🗂️</i><span>顧客カルテ</span></button><button type="button" data-view="analytics"><i>📊</i><span>営業分析</span></button><button type="button" data-view="history"><i>🕘</i><span>対応履歴</span></button><button type="button" data-view="tasks"><i>✅</i><span>タスク</span></button><button type="button" data-view="strategy"><i>🎯</i><span>営業戦略</span></button></nav><div class="side-foot">無料診断から相談・提案・商談化までを一元管理します。</div></aside>
<main class="main"><div class="top"><div><h1 id="pageTitle">営業ダッシュボード</h1><p class="sub">今日やることと、優先して対応すべき相談を確認します。</p></div><div class="top-actions"><button class="btn" id="resetBtn">デモを初期化</button><button class="btn primary" id="addDealBtn">顧客を追加</button></div></div><section id="dashboard" class="view active"></section><section id="diagnoses" class="view"></section><section id="customers" class="view"></section><section id="pipeline" class="view"></section><section id="detail" class="view"></section><section id="analytics" class="view"></section><section id="history" class="view"></section><section id="tasks" class="view"></section><section id="strategy" class="view"></section></main></div><div class="toast" id="toast"></div>
<script>
const TODAY='2026-07-24';const initialDeals=[{id:'C-001',client:'こう株式会社',contact:'田中様',phone:'086-111-2222',email:'tanaka@example.jp',source:'紹介',status:'提案中',amount:300000,probability:60,lastDate:'2026-07-22',nextDate:'2026-07-25',owner:'山本 健太',memo:'LPと問い合わせ導線の改善を提案予定',temperature:'高'},{id:'C-002',client:'岡山リフォーム',contact:'佐藤様',phone:'086-333-4444',email:'sato@example.jp',source:'直接営業',status:'新規問い合わせ',amount:120000,probability:30,lastDate:'2026-07-23',nextDate:'2026-07-24',owner:'山本 健太',memo:'無料診断から流入',temperature:'普通'}];const initialDiagnoses=[{id:'D-260724-001',receivedAt:'2026-07-24 13:42',status:'未対応',client:'株式会社サンプル工務店',contact:'佐々木 修',industry:'工務店・リフォーム',email:'sample@example.jp',phone:'086-000-0000',preferred:'メール',consultation:'社長への確認が多く、見積と案件管理を整理したい。',type:'社長集中型',primary:'社長への集中',primaryScore:82,secondary:'業務のムダ',secondaryScore:68,axes:{sales:46,owner:82,waste:68,customer:55,money:41,people:64},symptoms:['社長に聞かないと仕事が進まない','同じ内容を何度も入力している','誰かが休むと仕事が止まりそう','見積もりを出すまで時間がかかる'],hidden:'社長が動かないと進まない構造',impact:'判断待ち、返信の遅れ、社長の時間不足、成長の頭打ち',proposals:['社長への確認が必要な場面を3種類に整理する','よくある判断をルール化する','顧客・案件の状況を一覧化する'],price:'10万〜20万円程度',hours:'月10〜20時間',payback:'約3〜8か月',goal:'社員が自分で動ける状態',nextAction:'初回連絡し、実際の見積書と案件管理表を確認',nextDate:'2026-07-25',owner:'山本 健太',read:false,convertedDealId:''}];const initialTasks=[{id:'T-1',dealId:'C-002',title:'初回連絡',due:'2026-07-24',priority:'高',status:'今日'}];function load(){try{return JSON.parse(localStorage.getItem('salesPilotCRM120')||'null')||{deals:structuredClone(initialDeals),diagnoses:structuredClone(initialDiagnoses),tasks:structuredClone(initialTasks)}}catch{return {deals:structuredClone(initialDeals),diagnoses:structuredClone(initialDiagnoses),tasks:structuredClone(initialTasks)}}}let state=load(),selectedId=state.deals[0]?.id||'',selectedDiagnosisId=state.diagnoses[0]?.id||'';function save(){localStorage.setItem('salesPilotCRM120',JSON.stringify(state))}function $(s){return document.querySelector(s)}function money(n){return '¥'+Number(n||0).toLocaleString('ja-JP')}function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}function kpi(label,value,sub){return `<div class="card kpi"><span>${label}</span><strong>${value}</strong><small>${sub}</small></div>`}function titleFor(v){return {dashboard:'営業ダッシュボード',diagnoses:'診断相談・AI提案準備',customers:'顧客・商談管理',pipeline:'営業パイプライン',detail:'顧客カルテ',analytics:'営業分析',history:'対応履歴',tasks:'営業タスク',strategy:'営業戦略'}[v]||''}function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===v));document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.view===v));$('#pageTitle').textContent=titleFor(v);window.scrollTo({top:0,behavior:'smooth'})}function promptFor(x){return `あなたは小規模事業者の業務改善を支援する実務コンサルタントです。\n\n【顧客】${x.client}／${x.industry}\n【相談】${x.consultation}\n【診断】${x.type}\n最優先：${x.primary} ${x.primaryScore}点\n次点：${x.secondary} ${x.secondaryScore}点\n隠れた原因：${x.hidden}\n経営への影響：${x.impact}\n概算：${x.price}\n\n以下を作成してください。\n1. 診断の読み解き\n2. 初回商談で聞く質問\n3. 7日・30日・90日の改善案\n4. 使用ツールと納品物\n5. 工数・原価・利益を踏まえた見積もり\n6. 効果測定指標\n7. 顧客への説明文\n8. 商談後チェックリスト\n\n高額システムを前提にせず、Excel、Google Workspace、LINE、生成AIを優先してください。`}
function renderDashboard(){const unread=state.diagnoses.filter(x=>!x.read).length;const urgent=state.tasks.filter(x=>x.due<=TODAY&&x.status!=='完了').length;const pipeline=state.deals.reduce((a,x)=>a+x.amount,0);$('#dashboard').innerHTML=`<div class="alertbar"><b>新しい診断相談が${unread}件あります</b><button class="btn primary" data-go="diagnoses">確認する</button></div><div class="grid kpis">${kpi('新着診断相談',unread+'件','未読')}${kpi('今日のタスク',urgent+'件','期限到来')}${kpi('進行中商談',state.deals.length+'件','全案件')}${kpi('商談金額',money(pipeline),'見込総額')}</div><div class="grid two" style="margin-top:14px"><div class="card panel"><div class="panel-head"><h2>優先対応</h2></div>${state.diagnoses.map(x=>`<div class="diag-row ${!x.read?'unread':''}"><div><h3>${x.client}</h3><p>${x.type}｜${x.primary} ${x.primaryScore}点</p></div><div class="diag-actions"><button data-diag-open="${x.id}">詳細</button></div></div>`).join('')}</div><div class="card panel"><div class="panel-head"><h2>今日のタスク</h2></div>${state.tasks.map(x=>`<p><b>${x.title}</b><br><span class="sub">期限 ${x.due}</span></p>`).join('')}</div></div>`}
function renderDiagnoses(){const list=state.diagnoses;const x=list.find(v=>v.id===selectedDiagnosisId)||list[0];const rows=list.map(v=>`<div class="diag-row ${!v.read?'unread':''}"><div><h3>${!v.read?'● ':''}${v.client}</h3><p>${v.receivedAt}｜${v.contact}｜${v.industry}</p><div class="diag-meta"><span class="pill source-badge">無料診断</span><span class="pill blue">${v.type}</span><span class="pill red">${v.primary} ${v.primaryScore}点</span></div></div><div class="diag-actions"><button data-diag-open="${v.id}">詳細</button>${!v.convertedDealId?`<button class="primary-mini" data-diag-convert="${v.id}">商談化</button>`:`<button data-open="${v.convertedDealId}">顧客カルテ</button>`}</div></div>`).join('');let detail='<div class="empty">相談を選択してください</div>';if(x){detail=`<div class="card diag-detail"><div class="diag-toolbar"><span class="pill source-badge">${x.id}</span><select class="status-select" data-diag-status="${x.id}">${['未対応','連絡済み','商談予定','ヒアリング済み','提案作成中','提案済み','成約','保留','見送り'].map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></div><h2>${x.client}</h2><p class="sub">${x.contact}｜${x.email} / ${x.phone}</p><div class="diag-summary"><small>診断結果</small><strong>${x.type}</strong><span>${x.primary} ${x.primaryScore}点／次点 ${x.secondary} ${x.secondaryScore}点</span></div><div class="axis-mini">${Object.entries(x.axes).map(([k,v])=>`<div class="axis-chip"><span>${({sales:'売上機会',owner:'社長依存',waste:'ムダ時間',customer:'顧客対応',money:'数字管理',people:'属人化'}[k])}</span><b>${v}</b></div>`).join('')}</div><div class="diag-section"><h3>相談内容</h3><p>${x.consultation}</p></div><div class="diag-section"><h3>診断の核心</h3><p><b>${x.hidden}</b><br>${x.impact}</p></div><div class="diag-section"><h3>概算と次の行動</h3><p><b>${x.price}</b>｜${x.hours}｜回収 ${x.payback}</p><p>${x.nextAction}</p></div><div class="diag-section"><div class="panel-head"><h3>ChatGPT提案作成プロンプト</h3><button class="btn" data-copy="${x.id}">コピー</button></div><div class="prompt-box">${promptFor(x)}</div></div>${!x.convertedDealId?`<div class="diag-section"><button class="btn primary" data-diag-convert="${x.id}">この相談を商談として登録</button></div>`:''}</div>`}$('#diagnoses').innerHTML=`<div class="diag-layout"><div class="diag-list">${rows}</div>${detail}</div><div class="integration-box"><b>ネット診断との自動連携</b><p class="sub">次の段階でGoogle Apps ScriptのURLを設定し、相談を自動受信します。</p></div>`}
function renderCustomers(){if(!state.deals.length){$('#customers').innerHTML='<div class="card empty">顧客はまだありません</div>';return}$('#customers').innerHTML=`<div class="card panel table-wrap"><table class="table"><thead><tr><th>会社</th><th>担当者</th><th>流入元</th><th>状況</th><th>金額</th><th>次回</th></tr></thead><tbody>${state.deals.map(x=>`<tr data-open="${x.id}"><td><b>${x.client}</b></td><td>${x.contact}</td><td>${x.source}</td><td><span class="pill blue">${x.status}</span></td><td>${money(x.amount)}</td><td>${x.nextDate}</td></tr>`).join('')}</tbody></table></div>`}
function renderPipeline(){const stages=['新規問い合わせ','ヒアリング','提案中','見積提出','成約'];$('#pipeline').innerHTML=`<div class="pipeline">${stages.map(s=>`<div class="lane"><h3>${s}</h3>${state.deals.filter(x=>x.status===s).map(x=>`<div class="deal" data-open="${x.id}"><b>${x.client}</b><p>${money(x.amount)}｜次回 ${x.nextDate}</p></div>`).join('')}</div>`).join('')}</div>`}
function renderDetail(){const x=state.deals.find(v=>v.id===selectedId);if(!x){$('#detail').innerHTML='<div class="card empty">顧客を選択してください</div>';return}$('#detail').innerHTML=`<div class="card profile"><div class="panel-head"><div><h2>${x.client}</h2><p class="sub">${x.contact}｜${x.source}</p></div><button class="btn primary" id="saveDetail">保存</button></div><div class="form-grid"><div class="field"><label>担当者</label><input id="dContact" value="${x.contact}"></div><div class="field"><label>ステータス</label><select id="dStatus">${['新規問い合わせ','ヒアリング','提案中','見積提出','成約','失注'].map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>商談金額</label><input id="dAmount" type="number" value="${x.amount}"></div><div class="field"><label>次回対応日</label><input id="dNext" type="date" value="${x.nextDate}"></div><div class="field full"><label>メモ</label><textarea id="dMemo">${x.memo||''}</textarea></div></div>${x.diagnosis?`<div class="integration-box"><b>無料診断からの相談</b><p>${x.diagnosis.type}｜${x.diagnosis.primary} ${x.diagnosis.primaryScore}点｜${x.diagnosis.price}</p><button class="btn" data-from-diagnosis="${x.diagnosis.id}">元の診断を見る</button></div>`:''}</div>`}
function renderAnalytics(){const won=state.deals.filter(x=>x.status==='成約');$('#analytics').innerHTML=`<div class="grid kpis">${kpi('商談数',state.deals.length+'件','全件')}${kpi('成約数',won.length+'件','実績')}${kpi('成約額',money(won.reduce((a,x)=>a+x.amount,0)),'合計')}${kpi('診断経由',state.deals.filter(x=>x.source==='仕事詰まり診断').length+'件','商談化')}</div>`}
function renderHistory(){$('#history').innerHTML='<div class="card panel"><h2>対応履歴</h2><p class="sub">顧客ごとの連絡・商談履歴を今後ここに蓄積します。</p></div>'}function renderTasks(){$('#tasks').innerHTML=`<div class="card panel"><h2>営業タスク</h2>${state.tasks.map(x=>`<p><b>${x.title}</b><br><span class="sub">${x.due}｜${x.priority}</span></p>`).join('')}</div>`}function renderStrategy(){$('#strategy').innerHTML='<div class="card panel"><h2>営業戦略</h2><p class="sub">無料診断→初回連絡→ヒアリング→小さな提案→継続支援の順で進めます。</p></div>'}
function convert(id){const x=state.diagnoses.find(v=>v.id===id);if(!x||x.convertedDealId)return;const dealId='C-'+Date.now();state.deals.unshift({id:dealId,client:x.client,contact:x.contact,phone:x.phone,email:x.email,source:'仕事詰まり診断',status:'新規問い合わせ',amount:Number((x.price.match(/\d+/)||[10])[0])*10000,probability:30,lastDate:TODAY,nextDate:x.nextDate,owner:x.owner,memo:`【診断】${x.type}\n${x.consultation}`,temperature:'高',diagnosis:structuredClone(x)});x.convertedDealId=dealId;x.status='商談予定';x.read=true;state.tasks.unshift({id:'T-'+Date.now(),dealId,title:'診断相談へ初回連絡',due:x.nextDate,priority:'高',status:'今日'});selectedId=dealId;save();renderAll();toast('商談として登録しました')}
function bind(){document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>switchView(b.dataset.go));document.querySelectorAll('[data-diag-open]').forEach(b=>b.onclick=()=>{selectedDiagnosisId=b.dataset.diagOpen;const x=state.diagnoses.find(v=>v.id===selectedDiagnosisId);if(x)x.read=true;save();renderAll();switchView('diagnoses')});document.querySelectorAll('[data-diag-convert]').forEach(b=>b.onclick=()=>convert(b.dataset.diagConvert));document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{selectedId=b.dataset.open;renderAll();switchView('detail')});document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=async()=>{const x=state.diagnoses.find(v=>v.id===b.dataset.copy);await navigator.clipboard.writeText(promptFor(x));toast('プロンプトをコピーしました')});document.querySelectorAll('[data-diag-status]').forEach(s=>s.onchange=()=>{const x=state.diagnoses.find(v=>v.id===s.dataset.diagStatus);x.status=s.value;save();renderAll();switchView('diagnoses')});document.querySelectorAll('[data-from-diagnosis]').forEach(b=>b.onclick=()=>{selectedDiagnosisId=b.dataset.fromDiagnosis;renderAll();switchView('diagnoses')});const sv=$('#saveDetail');if(sv)sv.onclick=()=>{const x=state.deals.find(v=>v.id===selectedId);x.contact=$('#dContact').value;x.status=$('#dStatus').value;x.amount=Number($('#dAmount').value);x.nextDate=$('#dNext').value;x.memo=$('#dMemo').value;save();renderAll();switchView('detail');toast('保存しました')}}function renderAll(){renderDashboard();renderDiagnoses();renderCustomers();renderPipeline();renderDetail();renderAnalytics();renderHistory();renderTasks();renderStrategy();bind()}$('#resetBtn').onclick=()=>{if(confirm('デモデータを初期化しますか？')){localStorage.removeItem('salesPilotCRM120');location.reload()}};$('#addDealBtn').onclick=()=>toast('顧客追加フォームは次の改修で追加します');renderAll();
</script></body></html>
