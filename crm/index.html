<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SalesPilot CRM PRO</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1c34;color:#fff;display:grid;place-items:center;min-height:100vh}.box{text-align:center;padding:28px}.spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;margin:0 auto 16px;animation:r 1s linear infinite}@keyframes r{to{transform:rotate(360deg)}}.err{max-width:520px;line-height:1.7}</style></head><body><div class="box"><div class="spinner"></div><h1>SalesPilot CRM PRO</h1><p id="status">共有版を読み込んでいます…</p></div><script>(async()=>{try{if(!('DecompressionStream'in window))throw new Error('このブラウザは圧縮ファイルの展開に対応していません。SafariまたはChromeの最新版で開いてください。');const r=await fetch('./app.html.gz',{cache:'no-store'});if(!r.ok)throw new Error('CRM本体を取得できませんでした。');const ds=new DecompressionStream('gzip');const html=await new Response(r.body.pipeThrough(ds)).text();document.open();document.write(html);document.close()}catch(e){document.querySelector('.box').innerHTML='<div class="err"><h1>読み込みに失敗しました</h1><p>'+e.message+'</p><p>ページを再読み込みするか、Safari・Chromeで開いてください。</p></div>'}})();</script></body></html>
