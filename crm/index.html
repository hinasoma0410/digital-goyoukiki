<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SalesPilot CRM PRO</title>
<style>
:root{--navy:#0f1c34;--navy2:#152744;--blue:#3568f4;--bg:#f4f6fa;--card:#fff;--text:#182238;--muted:#70809a;--line:#dfe5ef;--green:#18a875;--red:#e5485d;--amber:#e6a52f;--shadow:0 10px 30px rgba(24,34,56,.08)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.app{min-height:100vh;display:grid;grid-template-columns:245px 1fr}.side{background:linear-gradient(180deg,var(--navy),#0b162b);color:#fff;padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:11px;align-items:center;padding:4px 8px 22px}.logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#4e7cff,#24b0ff);display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:15px}.brand span{display:block;font-size:10px;color:#9fb0ca;margin-top:2px}.nav{display:grid;gap:7px}.nav button{border:0;background:transparent;color:#b8c5d8;border-radius:12px;padding:12px 13px;text-align:left;font-weight:800;font-size:12px;display:flex;gap:10px;align-items:center;cursor:pointer}.nav button i{width:22px;text-align:center;font-style:normal}.nav button.active,.nav button:hover{background:#223a60;color:#fff}.side-foot{margin-top:24px;padding:14px 10px;border-top:1px solid rgba(255,255,255,.1);font-size:10px;color:#8799b7;line-height:1.7}.main{padding:25px;min-width:0}.top{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:18px}.top h1{margin:0;font-size:27px}.sub{color:var(--muted);font-size:11px;line-height:1.65}.top-actions{display:flex;gap:8px}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;font-size:11px;font-weight:800;cursor:pointer}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.ghost{background:#fff}.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(4,1fr)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.kpi{padding:17px}.kpi span{display:block;color:var(--muted);font-size:10px}.kpi strong{display:block;font-size:24px;margin-top:6px}.kpi small{font-size:10px;color:var(--muted)}.panel{padding:17px}.panel-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:13px}.panel-head h2,.panel-head h3{margin:0;font-size:15px}.two{grid-template-columns:1.4fr .9fr}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:720px}.table th,.table td{padding:11px 9px;border-bottom:1px solid var(--line);font-size:11px;text-align:left}.table th{font-size:9px;color:var(--muted);background:#f8fafc}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:9px;font-weight:900}.blue{background:#e9efff;color:#2959e8}.green{background:#e8f8f2;color:#087f5b}.amber{background:#fff4dc;color:#a76a00}.red{background:#ffe9ed;color:#bf2d43}.view{display:none}.view.active{display:block}.alertbar{background:#fff5e8;border:1px solid #efd5ae;border-radius:14px;padding:13px 15px;display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;font-size:11px}.pipeline{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:10px;overflow:auto}.lane{background:#eef2f7;border-radius:14px;padding:10px;min-height:420px}.lane h3{font-size:11px;margin:0 0 10px}.deal{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:0 5px 15px rgba(20,40,70,.05);cursor:pointer}.deal b{font-size:11px}.deal p{font-size:9px;color:var(--muted);line-height:1.5}.profile{padding:18px}.profile h2{margin:0}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;font-size:9px;font-weight:800;margin-bottom:5px;color:var(--muted)}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;background:#fff}.field textarea{min-height:85px}.full{grid-column:1/-1}.toast{position:fixed;right:18px;bottom:18px;background:#12213d;color:#fff;padding:12px 16px;border-radius:11px;opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s;z-index:80;font-size:11px}.toast.show{opacity:1;transform:none}.diag-kpi{position:relative;overflow:hidden}.diag-kpi:after{content:"";position:absolute;right:-22px;bottom:-28px;width:92px;height:92px;border-radius:50%;background:rgba(53,104,244,.08)}.diag-layout{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(360px,.95fr);gap:16px}.diag-list{display:grid;gap:10px}.diag-row{border:1px solid var(--line);border-radius:15px;padding:14px;background:#fff;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.diag-row.unread{border-color:#bfd0ff;background:#f7f9ff;box-shadow:0 8px 22px rgba(53,104,244,.08)}.diag-row h3{font-size:14px;margin:0 0 5px}.diag-row p{margin:0;color:var(--muted);font-size:11px;line-height:1.6}.diag-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.diag-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.diag-actions button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 9px;font-size:10px;font-weight:800}.diag-actions .primary-mini{background:var(--blue);color:#fff;border-color:var(--blue)}.diag-detail{padding:20px;position:sticky;top:18px;align-self:start}.diag-summary{background:linear-gradient(135deg,#13213b,#244fd2);color:#fff;border-radius:17px;padding:17px;margin:14px 0}.diag-summary small{color:#cbd8ff}.diag-summary strong{display:block;font-size:23px;margin:7px 0 3px}.axis-mini{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.axis-chip{background:#f7f9fc;border:1px solid var(--line);border-radius:11px;padding:10px}.axis-chip span{display:block;font-size:9px;color:var(--muted)}.axis-chip b{font-size:15px}.diag-section{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.diag-section h3{font-size:12px;margin:0 0 8px}.diag-section p,.diag-section li{font-size:11px;line-height:1.7;color:#46536a}.prompt-box{white-space:pre-wrap;background:#0e1930;color:#dbe5ff;border-radius:13px;padding:14px;font-size:10px;line-height:1.65;max-height:310px;overflow:auto}.diag-toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}.status-select{border:1px solid var(--line);border-radius:9px;padding:8px;background:#fff;font-size:11px}.source-badge{background:#eaf9f4;color:#087f5b}.deadline-badge{background:#fff0f2;color:var(--red)}.integration-box{background:#f8fafc;border:1px dashed #b9c5d9;border-radius:14px;padding:14px;margin-top:14px}.integration-box input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;margin-top:7px}.empty{padding:35px;text-align:center;color:var(--muted)}
@media(max-width:1050px){.two,.diag-layout{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.diag-detail{position:relative;top:auto}}
@media(max-width:780px){body{overflow-x:hidden}.app{display:block;min-height:100svh}.side{position:sticky;top:0;z-index:45;height:auto;min-height:0;padding:10px 10px 8px;box-shadow:0 10px 28px rgba(5,15,32,.24)}.brand{padding:0 4px 9px}.logo{width:36px;height:36px}.nav{display:flex;gap:7px;overflow-x:auto;padding:1px 1px 4px;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}.nav button{flex:0 0 88px;min-height:58px;padding:7px 5px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;text-align:center;font-size:10px;white-space:normal}.nav button i{font-size:18px}.side-foot{display:none}.main{padding:17px 12px 42px}.top{flex-direction:column;align-items:stretch}.top h1{font-size:24px}.top-actions{display:grid;grid-template-columns:1fr 1fr}.btn{min-height:44px}.kpis{grid-template-columns:1fr 1fr}.diag-actions{display:grid;grid-template-columns:1fr 1fr;width:100%}.diag-row{grid-template-columns:1fr}.axis-mini{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="brand"><div class="logo">SP</div><div><b>SalesPilot CRM</b><span>診断連携版</span></div></div><nav class="nav" aria-label="主要メニュー"><button type="button" class="active" data-view="dashboard"><i>🏠</i><span>ホーム</span></button><button type="button" data-view="diagnoses"><i>🩺</i><span>診断相談</span></button><button type="button" data-view="customers"><i>👥</i><span>顧客・商談</span></button><button type="button" data-view="pipeline"><i>📋</i><span>進捗管理</span></button><button type="button" data-view="detail"><i>🗂️</i><span>顧客カルテ</span></button><button type="button" data-view="analytics"><i>📊</i><span>営業分析</span></button><button type="button" data-view="history"><i>🕘</i><span>対応履歴</span></button><button type="button" data-view="tasks"><i>✅</i><span>タスク</span></button><button type="button" data-view="strategy"><i>🎯</i><span>営業戦略</span></button></nav><div class="side-foot">無料診断から相談・提案・商談化までを一元管理します。</div></aside>
<main class="main"><div class="top"><div><h1 id="pageTitle">営業ダッシュボード</h1><p class="sub">今日やることと、優先して対応すべき相談を確認します。</p></div><div class="top-actions"><button class="btn" id="resetBtn">再読み込み</button><button class="btn primary" id="addDealBtn">顧客・商談を追加</button></div></div><section id="dashboard" class="view active"></section><section id="diagnoses" class="view"></section><section id="customers" class="view"></section><section id="pipeline" class="view"></section><section id="detail" class="view"></section><section id="analytics" class="view"></section><section id="history" class="view"></section><section id="tasks" class="view"></section><section id="strategy" class="view"></section></main></div><div class="toast" id="toast"></div>
<div id="connectionStatus" style="position:fixed;left:12px;bottom:12px;z-index:70;background:#fff;border:1px solid #dfe5ef;border-radius:999px;padding:7px 11px;font-size:10px;box-shadow:0 6px 18px rgba(24,34,56,.1)">接続確認中…</div>
<div id="modalBackdrop" style="display:none;position:fixed;inset:0;background:rgba(8,18,35,.55);z-index:90;padding:18px;overflow:auto">
  <div class="card profile" style="max-width:720px;margin:4vh auto;background:#fff">
    <div class="panel-head"><h2>顧客・商談を追加</h2><button class="btn" id="closeModalBtn">閉じる</button></div>
    <div class="form-grid">
      <div class="field full"><label>会社名 *</label><input id="newCompany"></div>
      <div class="field"><label>担当者名</label><input id="newContact"></div>
      <div class="field"><label>業種</label><input id="newIndustry"></div>
      <div class="field"><label>メールアドレス</label><input id="newEmail" type="email"></div>
      <div class="field"><label>電話番号</label><input id="newPhone" type="tel"></div>
      <div class="field"><label>流入経路</label><select id="newSource"><option>直接営業</option><option>紹介</option><option>仕事詰まり診断</option><option>ホームページ</option><option>その他</option></select></div>
      <div class="field"><label>担当者</label><input id="newOwner" value="山本 健太"></div>
      <div class="field"><label>商談名</label><input id="newDealName" value="業務改善のご相談"></div>
      <div class="field"><label>商談ステータス</label><select id="newStatus"><option>未接触</option><option>ヒアリング</option><option>提案準備</option><option>提案済み</option><option>契約</option><option>失注</option></select></div>
      <div class="field"><label>見込金額</label><input id="newAmount" type="number" min="0" value="100000"></div>
      <div class="field"><label>確度（%）</label><input id="newProbability" type="number" min="0" max="100" value="30"></div>
      <div class="field"><label>次回対応日</label><input id="newNextDate" type="date"></div>
      <div class="field full"><label>備考</label><textarea id="newMemo"></textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px"><button class="btn" id="cancelModalBtn">キャンセル</button><button class="btn primary" id="createCustomerBtn">登録する</button></div>
  </div>
</div>
<script>

const API_URL='https://script.google.com/macros/s/AKfycbyRz6WNyjBgRvaTq9qHa4EXGlr2YBLoiTIV5vPngGmfQE3IY3mJ1ajBpHnfOv0hyuLxBg/exec';
const API_TOKEN='DIGITAL-GOYOUKIKI-2026';
const TODAY=new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'});
const $=s=>document.querySelector(s);
let state={deals:[],diagnoses:[],tasks:[],history:[]};
let selectedId='';
let selectedDiagnosisId='';
let loading=false;

function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function money(n){return '¥'+Number(n||0).toLocaleString('ja-JP');}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function setConnection(ok,text){const el=$('#connectionStatus');el.textContent=text;el.style.color=ok?'#087f5b':'#bf2d43';el.style.borderColor=ok?'#b9e6d5':'#f1bdc5';}
function kpi(label,value,sub){return `<div class="card kpi"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(sub)}</small></div>`;}
function titleFor(v){return {dashboard:'営業ダッシュボード',diagnoses:'診断相談・AI提案準備',customers:'顧客・商談管理',pipeline:'営業パイプライン',detail:'顧客カルテ',analytics:'営業分析',history:'対応履歴',tasks:'営業タスク',strategy:'営業戦略'}[v]||'';}
function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===v));document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.view===v));$('#pageTitle').textContent=titleFor(v);window.scrollTo({top:0,behavior:'smooth'});}
function isoDate(v){if(!v)return'';const m=String(v).match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:'';}
function n(v){const x=Number(String(v??'').replace(/[^0-9.-]/g,''));return Number.isFinite(x)?x:0;}
function makeId(prefix){return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,7).toUpperCase()}`;}

async function apiGet(action,params={}){
 const u=new URL(API_URL);u.searchParams.set('action',action);u.searchParams.set('token',API_TOKEN);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
 const r=await fetch(u.toString(),{cache:'no-store'});if(!r.ok)throw new Error(`通信エラー（${r.status}）`);const j=await r.json();if(!j.success)throw new Error(j.message||'APIエラー');return j;
}
async function apiPost(payload){
 const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...payload,token:API_TOKEN})});
 if(!r.ok)throw new Error(`通信エラー（${r.status}）`);const j=await r.json();if(!j.success)throw new Error(j.message||'APIエラー');return j;
}
async function list(sheet){return (await apiGet('list',{sheet})).data||[];}

function mapDiagnosis(x){
 const scores={sales:n(x['売上の取りこぼし']),owner:n(x['社長への集中']),waste:n(x['業務のムダ']),customer:n(x['顧客対応の不安']),money:n(x['お金と管理の不安']),people:n(x['人と引き継ぎの不安'])};
 const labels={sales:'売上の取りこぼし',owner:'社長への集中',waste:'業務のムダ',customer:'顧客対応の不安',money:'お金と管理の不安',people:'人と引き継ぎの不安'};
 const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
 return {id:x['相談ID'],receivedAt:x['受付日時'],status:x['対応状況']||'未対応',owner:x['担当者']||'',client:x['会社名']||'会社名未入力',contact:x['担当者名']||'',email:x['メールアドレス']||'',phone:x['電話番号']||'',industry:x['業種']||'',consultation:x['相談内容']||'',type:x['診断タイプ']||x['診断結果']||'診断結果',primary:labels[sorted[0]?.[0]]||'未判定',primaryScore:sorted[0]?.[1]||0,secondary:labels[sorted[1]?.[0]]||'未判定',secondaryScore:sorted[1]?.[1]||0,axes:scores,result:x['診断結果']||'',prompt:x['ChatGPTプロンプト']||'',nextDate:isoDate(x['初回連絡期限']),read:(x['対応状況']||'未対応')!=='未対応',convertedDealId:''};
}
function mapDeal(x,customers){
 const c=customers.find(v=>v['顧客ID']===x['顧客ID'])||{};
 return {id:x['商談ID'],customerId:x['顧客ID'],client:x['会社名']||c['会社名']||'',contact:c['担当者名']||'',phone:c['電話番号']||'',email:c['メールアドレス']||'',industry:c['業種']||'',source:c['流入経路']||'',status:x['商談ステータス']||'未接触',amount:n(x['見込金額']),probability:n(x['確度']),nextDate:isoDate(x['次回対応日']),owner:x['担当者']||c['担当者']||'',memo:x['備考']||x['提案内容']||'',dealName:x['商談名']||'業務改善のご相談'};
}
function mapTask(x){return {id:x['タスクID'],customerId:x['顧客ID'],dealId:x['商談ID'],client:x['会社名']||'',title:x['タスク名']||'',owner:x['担当者']||'',due:isoDate(x['期限']),priority:x['優先度']||'中',status:x['状態']||'未着手',memo:x['備考']||''};}
function mapHistory(x){return {id:x['履歴ID'],customerId:x['顧客ID'],dealId:x['商談ID'],client:x['会社名']||'',date:x['対応日時']||'',owner:x['対応者']||'',type:x['対応種別']||'',content:x['対応内容']||'',nextDate:isoDate(x['次回対応日'])};}

async function loadRemote(){
 if(loading)return;loading=true;setConnection(false,'データ読込中…');
 try{
  await apiGet('ping');
  const [diagnoses,customers,deals,tasks,history]=await Promise.all([list('診断相談'),list('顧客'),list('商談'),list('タスク'),list('対応履歴')]);
  state={diagnoses:diagnoses.map(mapDiagnosis),deals:deals.map(x=>mapDeal(x,customers)),tasks:tasks.map(mapTask),history:history.map(mapHistory)};
  selectedId=state.deals.some(x=>x.id===selectedId)?selectedId:(state.deals[0]?.id||'');
  selectedDiagnosisId=state.diagnoses.some(x=>x.id===selectedDiagnosisId)?selectedDiagnosisId:(state.diagnoses[0]?.id||'');
  renderAll();setConnection(true,'● スプレッドシート接続中');
 }catch(e){console.error(e);setConnection(false,'接続エラー');toast(e.message);renderAll();}
 finally{loading=false;}
}

function promptFor(x){if(x.prompt)return x.prompt;return `あなたは小規模事業者の業務改善を支援する実務コンサルタントです。\n\n【顧客】${x.client}／${x.industry}\n【相談】${x.consultation}\n【診断】${x.type}\n最優先：${x.primary} ${x.primaryScore}点\n次点：${x.secondary} ${x.secondaryScore}点\n\n以下を作成してください。\n1. 診断の読み解き\n2. 初回商談で聞く質問\n3. 7日・30日・90日の改善案\n4. 使用ツールと納品物\n5. 工数・原価・利益を踏まえた見積もり\n6. 効果測定指標\n7. 顧客への説明文\n8. 商談後チェックリスト`;}
function renderDashboard(){const unread=state.diagnoses.filter(x=>!x.read).length;const urgent=state.tasks.filter(x=>x.due&&x.due<=TODAY&&x.status!=='完了').length;const pipeline=state.deals.reduce((a,x)=>a+x.amount,0);$('#dashboard').innerHTML=`<div class="alertbar"><b>新しい診断相談が${unread}件あります</b><button class="btn primary" data-go="diagnoses">確認する</button></div><div class="grid kpis">${kpi('新着診断相談',unread+'件','未対応')}${kpi('期限到来タスク',urgent+'件','今日以前')}${kpi('進行中商談',state.deals.filter(x=>!['契約','失注'].includes(x.status)).length+'件','進行中')}${kpi('商談金額',money(pipeline),'見込総額')}</div><div class="grid two" style="margin-top:14px"><div class="card panel"><div class="panel-head"><h2>優先対応</h2></div>${state.diagnoses.length?state.diagnoses.slice(0,8).map(x=>`<div class="diag-row ${!x.read?'unread':''}"><div><h3>${esc(x.client)}</h3><p>${esc(x.type)}｜${esc(x.primary)} ${x.primaryScore}点</p></div><div class="diag-actions"><button data-diag-open="${esc(x.id)}">詳細</button></div></div>`).join(''):'<div class="empty">診断相談はまだありません</div>'}</div><div class="card panel"><div class="panel-head"><h2>今日のタスク</h2></div>${state.tasks.length?state.tasks.filter(x=>x.status!=='完了').slice(0,8).map(x=>`<p><b>${esc(x.title)}</b><br><span class="sub">${esc(x.client)}｜期限 ${esc(x.due||'未設定')}</span></p>`).join(''):'<div class="empty">未完了タスクはありません</div>'}</div></div>`;}
function renderDiagnoses(){const list=state.diagnoses;const x=list.find(v=>v.id===selectedDiagnosisId)||list[0];const rows=list.map(v=>`<div class="diag-row ${!v.read?'unread':''}"><div><h3>${!v.read?'● ':''}${esc(v.client)}</h3><p>${esc(v.receivedAt)}｜${esc(v.contact)}｜${esc(v.industry)}</p><div class="diag-meta"><span class="pill source-badge">無料診断</span><span class="pill blue">${esc(v.type)}</span><span class="pill red">${esc(v.primary)} ${v.primaryScore}点</span></div></div><div class="diag-actions"><button data-diag-open="${esc(v.id)}">詳細</button><button class="primary-mini" data-diag-convert="${esc(v.id)}">商談化</button></div></div>`).join('');let detail='<div class="empty">相談を選択してください</div>';if(x){detail=`<div class="card diag-detail"><div class="diag-toolbar"><span class="pill source-badge">${esc(x.id)}</span><select class="status-select" data-diag-status="${esc(x.id)}">${['未対応','対応中','商談化','保留','完了'].map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></div><h2>${esc(x.client)}</h2><p class="sub">${esc(x.contact)}｜${esc(x.email)} / ${esc(x.phone)}</p><div class="diag-summary"><small>診断結果</small><strong>${esc(x.type)}</strong><span>${esc(x.primary)} ${x.primaryScore}点／次点 ${esc(x.secondary)} ${x.secondaryScore}点</span></div><div class="axis-mini">${Object.entries(x.axes).map(([k,v])=>`<div class="axis-chip"><span>${esc(({sales:'売上の取りこぼし',owner:'社長への集中',waste:'業務のムダ',customer:'顧客対応の不安',money:'お金と管理の不安',people:'人と引き継ぎの不安'}[k]))}</span><b>${v}</b></div>`).join('')}</div><div class="diag-section"><h3>相談内容</h3><p>${esc(x.consultation)||'未入力'}</p></div><div class="diag-section"><h3>診断結果の詳細</h3><p>${esc(x.result)||'詳細は未登録です'}</p></div><div class="diag-section"><div class="panel-head"><h3>ChatGPT提案作成プロンプト</h3><button class="btn" data-copy="${esc(x.id)}">コピー</button></div><div class="prompt-box">${esc(promptFor(x))}</div></div><div class="diag-section"><button class="btn primary" data-diag-convert="${esc(x.id)}">この相談を商談として登録</button></div></div>`;}$('#diagnoses').innerHTML=`<div class="diag-layout"><div class="diag-list">${rows||'<div class="card empty">診断相談はまだありません</div>'}</div>${detail}</div><div class="integration-box"><b>Googleスプレッドシートと自動連携中</b><p class="sub">新しい相談は再読み込み後、この画面に表示されます。</p></div>`;}
function renderCustomers(){if(!state.deals.length){$('#customers').innerHTML='<div class="card empty">顧客・商談はまだありません</div>';return;}$('#customers').innerHTML=`<div class="card panel table-wrap"><table class="table"><thead><tr><th>会社</th><th>担当者</th><th>流入元</th><th>状況</th><th>金額</th><th>次回</th></tr></thead><tbody>${state.deals.map(x=>`<tr data-open="${esc(x.id)}"><td><b>${esc(x.client)}</b></td><td>${esc(x.contact)}</td><td>${esc(x.source)}</td><td><span class="pill blue">${esc(x.status)}</span></td><td>${money(x.amount)}</td><td>${esc(x.nextDate||'未設定')}</td></tr>`).join('')}</tbody></table></div>`;}
function renderPipeline(){const stages=['未接触','ヒアリング','提案準備','提案済み','契約','失注'];$('#pipeline').innerHTML=`<div class="pipeline">${stages.map(s=>`<div class="lane"><h3>${s}</h3>${state.deals.filter(x=>x.status===s).map(x=>`<div class="deal" data-open="${esc(x.id)}"><b>${esc(x.client)}</b><p>${money(x.amount)}｜次回 ${esc(x.nextDate||'未設定')}</p></div>`).join('')}</div>`).join('')}</div>`;}
function renderDetail(){const x=state.deals.find(v=>v.id===selectedId);if(!x){$('#detail').innerHTML='<div class="card empty">顧客を選択してください</div>';return;}$('#detail').innerHTML=`<div class="card profile"><div class="panel-head"><div><h2>${esc(x.client)}</h2><p class="sub">${esc(x.dealName)}｜${esc(x.source)}</p></div><button class="btn primary" id="saveDetail">保存</button></div><div class="form-grid"><div class="field"><label>会社名</label><input id="dCompany" value="${esc(x.client)}"></div><div class="field"><label>担当者名</label><input id="dContact" value="${esc(x.contact)}"></div><div class="field"><label>メールアドレス</label><input id="dEmail" value="${esc(x.email)}"></div><div class="field"><label>電話番号</label><input id="dPhone" value="${esc(x.phone)}"></div><div class="field"><label>ステータス</label><select id="dStatus">${['未接触','ヒアリング','提案準備','提案済み','契約','失注'].map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>商談金額</label><input id="dAmount" type="number" value="${x.amount}"></div><div class="field"><label>確度（%）</label><input id="dProbability" type="number" min="0" max="100" value="${x.probability}"></div><div class="field"><label>次回対応日</label><input id="dNext" type="date" value="${esc(x.nextDate)}"></div><div class="field full"><label>メモ</label><textarea id="dMemo">${esc(x.memo)}</textarea></div></div></div>`;}
function renderAnalytics(){const won=state.deals.filter(x=>x.status==='契約');const expected=state.deals.reduce((a,x)=>a+x.amount*x.probability/100,0);$('#analytics').innerHTML=`<div class="grid kpis">${kpi('商談数',state.deals.length+'件','全件')}${kpi('契約数',won.length+'件','実績')}${kpi('契約額',money(won.reduce((a,x)=>a+x.amount,0)),'合計')}${kpi('期待売上',money(Math.round(expected)),'金額×確度')}</div>`;}
function renderHistory(){$('#history').innerHTML=state.history.length?`<div class="card panel table-wrap"><table class="table"><thead><tr><th>日時</th><th>会社</th><th>種別</th><th>対応者</th><th>内容</th><th>次回</th></tr></thead><tbody>${state.history.map(x=>`<tr><td>${esc(x.date)}</td><td>${esc(x.client)}</td><td>${esc(x.type)}</td><td>${esc(x.owner)}</td><td>${esc(x.content)}</td><td>${esc(x.nextDate)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="card empty">対応履歴はまだありません</div>';}
function renderTasks(){$('#tasks').innerHTML=state.tasks.length?`<div class="card panel"><h2>営業タスク</h2>${state.tasks.map(x=>`<div class="diag-row"><div><h3>${esc(x.title)}</h3><p>${esc(x.client)}｜期限 ${esc(x.due||'未設定')}｜担当 ${esc(x.owner)}</p></div><div class="diag-actions"><span class="pill ${x.status==='完了'?'green':'amber'}">${esc(x.status)}</span>${x.status!=='完了'?`<button data-task-complete="${esc(x.id)}">完了</button>`:''}</div></div>`).join('')}</div>`:'<div class="card empty">タスクはまだありません</div>';}
function renderStrategy(){$('#strategy').innerHTML='<div class="card panel"><h2>営業戦略</h2><p class="sub">無料診断 → 初回連絡 → ヒアリング → 小さな提案 → 継続支援の順で進めます。</p></div>';}
function renderAll(){renderDashboard();renderDiagnoses();renderCustomers();renderPipeline();renderDetail();renderAnalytics();renderHistory();renderTasks();renderStrategy();bind();}

async function updateDiagnosisStatus(id,status){await apiPost({action:'update',sheet:'診断相談',id,data:{'対応状況':status}});const x=state.diagnoses.find(v=>v.id===id);if(x){x.status=status;x.read=status!=='未対応';}renderAll();switchView('diagnoses');toast('対応状況を更新しました');}
async function convertDiagnosis(id){const x=state.diagnoses.find(v=>v.id===id);if(!x)return;const existing=state.deals.find(d=>d.client===x.client&&d.contact===x.contact);if(existing&&!confirm('同じ会社・担当者の商談があります。追加で商談化しますか？'))return;const customerId=makeId('CUS'),dealId=makeId('DEAL'),taskId=makeId('TASK');
 try{setConnection(false,'商談登録中…');
  await apiPost({action:'create',sheet:'顧客',data:{'顧客ID':customerId,'顧客区分':'見込み顧客','会社名':x.client,'担当者名':x.contact,'メールアドレス':x.email,'電話番号':x.phone,'業種':x.industry,'流入経路':'仕事詰まり診断','担当者':x.owner,'顧客ステータス':'商談中','備考':x.consultation}});
  await apiPost({action:'create',sheet:'商談',data:{'商談ID':dealId,'顧客ID':customerId,'会社名':x.client,'商談名':`${x.type}の改善相談`,'商談ステータス':'未接触','担当者':x.owner,'見込金額':100000,'確度':30,'次回対応日':x.nextDate,'提案内容':x.result,'備考':x.consultation}});
  await apiPost({action:'create',sheet:'タスク',data:{'タスクID':taskId,'顧客ID':customerId,'商談ID':dealId,'会社名':x.client,'タスク名':'診断相談へ初回連絡','担当者':x.owner,'期限':x.nextDate||TODAY,'優先度':'高','状態':'未着手','備考':'無料診断から自動作成'}});
  await apiPost({action:'update',sheet:'診断相談',id,data:{'対応状況':'商談化'}});
  await loadRemote();selectedId=dealId;renderAll();switchView('detail');toast('商談として登録しました');
 }catch(e){console.error(e);toast(e.message);setConnection(false,'登録エラー');}}
async function saveDetail(){const x=state.deals.find(v=>v.id===selectedId);if(!x)return;const btn=$('#saveDetail');btn.disabled=true;btn.textContent='保存中…';try{const company=$('#dCompany').value.trim();await apiPost({action:'update',sheet:'顧客',id:x.customerId,data:{'会社名':company,'担当者名':$('#dContact').value.trim(),'メールアドレス':$('#dEmail').value.trim(),'電話番号':$('#dPhone').value.trim()}});await apiPost({action:'update',sheet:'商談',id:x.id,data:{'会社名':company,'商談ステータス':$('#dStatus').value,'見込金額':Number($('#dAmount').value||0),'確度':Number($('#dProbability').value||0),'次回対応日':$('#dNext').value,'備考':$('#dMemo').value}});await loadRemote();selectedId=x.id;renderAll();switchView('detail');toast('保存しました');}catch(e){toast(e.message);}finally{btn.disabled=false;btn.textContent='保存';}}
async function completeTask(id){try{await apiPost({action:'update',sheet:'タスク',id,data:{'状態':'完了','完了日時':new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'})}});await loadRemote();switchView('tasks');toast('タスクを完了しました');}catch(e){toast(e.message);}}
function openModal(){const d=new Date(Date.now()+86400000).toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'});$('#newNextDate').value=d;$('#modalBackdrop').style.display='block';}
function closeModal(){$('#modalBackdrop').style.display='none';}
async function createCustomerDeal(){const company=$('#newCompany').value.trim();if(!company){toast('会社名を入力してください');return;}const customerId=makeId('CUS'),dealId=makeId('DEAL');const btn=$('#createCustomerBtn');btn.disabled=true;btn.textContent='登録中…';try{await apiPost({action:'create',sheet:'顧客',data:{'顧客ID':customerId,'顧客区分':'見込み顧客','会社名':company,'担当者名':$('#newContact').value.trim(),'メールアドレス':$('#newEmail').value.trim(),'電話番号':$('#newPhone').value.trim(),'業種':$('#newIndustry').value.trim(),'流入経路':$('#newSource').value,'担当者':$('#newOwner').value.trim(),'顧客ステータス':'商談中','備考':$('#newMemo').value}});await apiPost({action:'create',sheet:'商談',data:{'商談ID':dealId,'顧客ID':customerId,'会社名':company,'商談名':$('#newDealName').value.trim()||'業務改善のご相談','商談ステータス':$('#newStatus').value,'担当者':$('#newOwner').value.trim(),'見込金額':Number($('#newAmount').value||0),'確度':Number($('#newProbability').value||0),'次回対応日':$('#newNextDate').value,'備考':$('#newMemo').value}});closeModal();await loadRemote();selectedId=dealId;renderAll();switchView('detail');toast('顧客・商談を登録しました');}catch(e){toast(e.message);}finally{btn.disabled=false;btn.textContent='登録する';}}
function bind(){document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>switchView(b.dataset.go));document.querySelectorAll('[data-diag-open]').forEach(b=>b.onclick=()=>{selectedDiagnosisId=b.dataset.diagOpen;renderAll();switchView('diagnoses');});document.querySelectorAll('[data-diag-convert]').forEach(b=>b.onclick=()=>convertDiagnosis(b.dataset.diagConvert));document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{selectedId=b.dataset.open;renderAll();switchView('detail');});document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=async()=>{const x=state.diagnoses.find(v=>v.id===b.dataset.copy);try{await navigator.clipboard.writeText(promptFor(x));toast('プロンプトをコピーしました');}catch{toast('コピーできませんでした');}});document.querySelectorAll('[data-diag-status]').forEach(s=>s.onchange=()=>updateDiagnosisStatus(s.dataset.diagStatus,s.value));document.querySelectorAll('[data-task-complete]').forEach(b=>b.onclick=()=>completeTask(b.dataset.taskComplete));const sv=$('#saveDetail');if(sv)sv.onclick=saveDetail;}
$('#resetBtn').onclick=loadRemote;$('#addDealBtn').onclick=openModal;$('#closeModalBtn').onclick=closeModal;$('#cancelModalBtn').onclick=closeModal;$('#createCustomerBtn').onclick=createCustomerDeal;$('#modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal();});
renderAll();loadRemote();

</script></body></html>
