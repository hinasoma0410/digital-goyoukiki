<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仕事ラクラク診断｜デジタル御用聞き</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
<aside class="sidebar">
 <div class="brand"><div class="brandmark">DX</div><div><b>デジタル御用聞き</b><span>仕事ラクラク診断</span></div></div>
 <div class="mode-box">
  <label>利用モード</label>
  <div class="mode-tabs"><button id="netMode" class="active">ネット診断</button><button id="faceMode">対面営業</button></div>
 </div>
 <nav>
  <button class="active" data-view="welcome">01 はじめる</button>
  <button data-view="pain">02 困りごと</button>
  <button data-view="question">03 かんたん質問</button>
  <button data-view="result">04 診断結果</button>
  <button data-view="future">05 未来を選ぶ</button>
  <button data-view="contact">06 無料相談</button>
  <button data-view="sales" class="face-only">07 営業メモ</button>
  <button data-view="settings" class="face-only">08 設定</button>
  <button data-view="report" class="face-only">09 診断書</button>
 </nav>
 <div class="side-card"><b>進み具合</b><p>選ぶだけで進めます。難しい入力はありません。</p><div class="progress"><span id="progressBar" style="width:0%"></span></div><p id="progressText">0%</p></div>
</aside>

<main class="main">
 <div class="top">
  <div><h1 id="pageTitle">仕事を少しラクにする方法を探します</h1><p id="pageSub">約3分。難しい専門用語は使いません。</p></div>
  <div class="minor no-print"><button class="btn text" id="restartBtn">最初からやり直す</button></div>
 </div>

 <section id="welcome" class="view active"></section>
 <section id="pain" class="view"></section>
 <section id="question" class="view"></section>
 <section id="thinking" class="view"></section>
 <section id="result" class="view"></section>
 <section id="future" class="view"></section>
 <section id="contact" class="view"></section>
 <section id="sales" class="view"></section>
 <section id="settings" class="view"></section>
 <section id="report" class="view"></section>
</main>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
