<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>仕事ラクラク診断｜版の選択</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;margin:0;background:#f6f7fb;color:#182033}.wrap{max-width:900px;margin:60px auto;padding:20px}.card{background:#fff;border:1px solid #e4e8f0;border-radius:20px;padding:28px;box-shadow:0 16px 42px rgba(25,40,80,.09)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.box{border:1px solid #e4e8f0;border-radius:16px;padding:22px}h1{font-size:28px;margin:0 0 10px}h2{font-size:20px;margin:0 0 8px}p,li{line-height:1.8;color:#717b8f}a.btn{display:inline-block;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:700;border:1px solid #3155d9;background:#3155d9;color:#fff}a.btn.secondary{background:#fff;color:#182033;border-color:#e4e8f0}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><h1>仕事ラクラク診断</h1><p>用途ごとに2つの版へ分けています。どちらも、最大3つの候補を比較して優先順位を出す診断方式です。</p><div class="grid"><div class="box"><h2>ネット公開版</h2><p>お客様が一人で使う前提です。診断結果と無料相談への導線だけを表示します。</p><ul><li>最大3つの課題を比較</li><li>最優先・次点・後回しを表示</li><li>営業メモは表示しない</li></ul><a class="btn" href="./public/">ネット公開版を開く</a></div><div class="box"><h2>対面営業版</h2><p>営業担当がお客様と一緒に使う前提です。営業メモ、設定、診断書まで使えます。</p><ul><li>決裁者・予算感・温度感の記録</li><li>提案トークを自動生成</li><li>PDF診断書</li></ul><a class="btn secondary" href="./face/">対面営業版を開く</a></div></div></div></div></body></html>
