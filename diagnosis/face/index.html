<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仕事ラクラク診断｜対面営業版</title>
<link rel="stylesheet" href="../style.css">
<style>.mode-box{display:none!important}</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
 <div class="brand"><div class="brandmark">DX</div><div><b>デジタル御用聞き</b><span>仕事ラクラク診断｜対面営業版</span></div></div>
 <div class="mode-box"><div class="mode-tabs"><button id="netMode">ネット診断</button><button id="faceMode" class="active">対面営業</button></div></div>
 <nav>
  <button class="active" data-view="welcome">01 はじめる</button>
  <button data-view="pain">02 困りごと</button>
  <button data-view="question">03 かんたん質問</button>
  <button data-view="result">04 診断結果</button>
  <button data-view="future">05 未来を選ぶ</button>
  <button data-view="contact">06 無料相談</button>
  <button data-view="sales" class="face-only">07 営業メモ</button>
  <button data-view="settings" class="face-only">08 設定</button>
  <button data-view="report" class="face-only">09 診断書</button>
 </nav>
 <div class="side-card"><b>進み具合</b><p>お客様と話しながら進め、営業メモと診断書まで作れます。</p><div class="progress"><span id="progressBar" style="width:0%"></span></div><p id="progressText">0%</p></div>
</aside>
<main class="main">
 <div class="top"><div><h1 id="pageTitle">営業用ヒアリングと提案をまとめます</h1><p id="pageSub">営業担当がお客様と一緒に使う対面営業版です。</p></div><div class="minor no-print"><button class="btn text" id="restartBtn">最初からやり直す</button></div></div>
 <section id="welcome" class="view active"></section><section id="pain" class="view"></section><section id="question" class="view"></section><section id="thinking" class="view"></section><section id="result" class="view"></section><section id="future" class="view"></section><section id="contact" class="view"></section><section id="sales" class="view"></section><section id="settings" class="view"></section><section id="report" class="view"></section>
</main>
</div>
<div class="toast" id="toast"></div>
<script>
try{const x=JSON.parse(localStorage.getItem('workEasyV3')||'{}');x.mode='face';x.screen='welcome';localStorage.setItem('workEasyV3',JSON.stringify(x))}catch(e){}
(() => {const nativeScrollTo=window.scrollTo.bind(window);let keep=false,x=0,y=0;document.addEventListener('pointerdown',e=>{if(!e.target.closest('[data-pain],[data-answer],[data-future]'))return;keep=true;x=window.scrollX;y=window.scrollY},true);window.scrollTo=(...args)=>{if(keep){keep=false;requestAnimationFrame(()=>nativeScrollTo(x,y));return}nativeScrollTo(...args)}})();
</script>
<script src="../app.js"></script>
</body>
</html>
