<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>無料かんたん診断｜デジタル御用聞き</title>
<meta name="description" content="5つの質問に答えるだけで、小さな会社の業務改善のヒントと改善効果の目安がわかる無料診断です。">
<style>
:root{--navy:#07152f;--blue:#315ae8;--orange:#f2610b;--green:#16885f;--ink:#111a2e;--muted:#647087;--line:#dce3ef;--soft:#f4f7fc;--white:#fff;--shadow:0 12px 30px rgba(26,43,82,.09)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#f3f6fb;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.65}button,a{font:inherit}.wrap{width:min(760px,100%);margin:auto;min-height:100vh;background:#fff}.hero{padding:26px 22px 22px;text-align:center;color:#fff;background:linear-gradient(135deg,#06132b,#102757)}.brand{font-size:13px;font-weight:700;letter-spacing:.08em;opacity:.9}.hero h1{margin:8px 0 4px;font-size:clamp(28px,7vw,42px);line-height:1.25}.hero p{margin:0;color:#d9e3f5;font-weight:600}.time{display:inline-block;margin-left:8px;padding:4px 10px;border:1px solid #65b7dc;border-radius:999px;background:#0b3858;font-size:13px;vertical-align:middle}.progress-wrap{padding:20px 20px 5px;background:#fff}.steps{display:flex;align-items:center;justify-content:space-between;position:relative}.steps:before{content:"";position:absolute;left:18px;right:18px;top:50%;height:3px;background:#e5e9f1;transform:translateY(-50%)}.step{position:relative;z-index:1;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#edf0f5;color:#667087;font-size:13px;font-weight:800;border:2px solid #fff}.step.active,.step.done{background:var(--blue);color:#fff}.screen{display:none;padding:18px 18px 34px}.screen.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}.qhead{display:flex;gap:12px;align-items:flex-start;margin-bottom:18px}.num{flex:0 0 34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:800}.qhead h2{font-size:22px;line-height:1.45;margin:0}.hint{margin:4px 0 0;color:var(--muted);font-size:14px}.options{display:grid;gap:10px}.option{position:relative;display:flex;align-items:center;gap:12px;min-height:58px;padding:13px 14px;border:2px solid #e3e8f1;border-radius:14px;background:#fff;cursor:pointer;font-weight:650;transition:.15s}.option:hover{border-color:#9bb0f2}.option.selected{border-color:var(--blue);background:#f2f5ff;color:#173bba}.option input{width:19px;height:19px;accent-color:var(--blue);flex:none}.nav{display:flex;gap:10px;margin-top:20px}.btn{border:0;border-radius:13px;padding:14px 18px;font-weight:800;cursor:pointer;text-align:center;text-decoration:none}.btn.primary{background:var(--blue);color:#fff;flex:1}.btn.back{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn:disabled{opacity:.4;cursor:not-allowed}.privacy{text-align:center;color:#7b8497;font-size:12px;margin:13px 0 0}.result{padding:0 16px 40px;background:#f3f6fb}.result-header{margin:0 -16px;padding:18px;text-align:center;background:var(--navy);color:#fff;font-weight:800;font-size:21px}.result-card{margin-top:18px;background:#fff;border-radius:18px;padding:22px;box-shadow:var(--shadow)}.eyebrow{text-align:center;font-weight:800;color:#a05a08;background:#fff4d7;border-radius:8px;padding:8px}.result h2{text-align:center;font-size:clamp(27px,7vw,38px);line-height:1.35;margin:18px 0 10px}.accent{color:var(--orange)}.lead{text-align:center;color:#505c72;margin:0}.money{margin-top:20px;padding:20px;border:1px solid #f3dfc7;border-radius:16px;background:linear-gradient(135deg,#fff,#fff7ed)}.money-label{font-weight:800}.money-value{color:var(--orange);font-weight:900;font-size:clamp(38px,11vw,58px);line-height:1.15;margin:4px 0}.money-value small{font-size:19px}.money-note{font-size:12px;color:#7b8497}.simple-title{font-size:19px;margin:0 0 12px}.points{display:grid;gap:10px}.point{display:flex;gap:10px}.check{color:var(--blue);font-weight:900}.risk{border-left:5px solid #f05d5e}.solution{border-left:5px solid var(--green);background:#f4fcf8}.service{border:2px solid #ffd39b;background:linear-gradient(145deg,#fffaf2,#fff0d4);text-align:center}.service .small{color:#c15d00;font-weight:800}.service h3{font-size:26px;line-height:1.35;margin:7px 0}.benefits{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:17px 0}.benefit{padding:12px 6px;background:#fff;border-radius:12px;font-size:12px;font-weight:800}.cta{display:block;width:100%;margin-top:10px;padding:17px 12px;border-radius:13px;background:var(--orange);color:#fff;text-decoration:none;font-weight:900;font-size:18px}.cta.line{background:#fff;color:#168744;border:2px solid #25a760}.again{display:block;text-align:center;color:#61708b;margin-top:18px;font-weight:700}.disclaimer{font-size:12px;color:#778197;margin-top:12px}.hidden{display:none!important}
@media(max-width:520px){.hero{padding:21px 16px 18px}.hero h1{font-size:29px}.hero p{font-size:14px}.screen{padding:14px 12px 28px}.card{padding:18px 14px;border-radius:15px;box-shadow:none}.qhead h2{font-size:19px}.option{font-size:15px;min-height:55px;padding:11px}.benefits{grid-template-columns:1fr}.benefit{font-size:14px}.result-card{padding:18px 15px}.result h2{font-size:28px}.nav{position:sticky;bottom:8px;background:rgba(255,255,255,.94);padding:8px 0}.btn{padding:14px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero"><div class="brand">デジタル御用聞き</div><h1>無料でかんたん診断 <span class="time">約1分</span></h1><p>5つの質問で、改善の入口がわかります</p></header>
<div id="quiz">
<div class="progress-wrap"><div class="steps" id="steps"></div></div>
<div id="screens"></div>
</div>
<section id="result" class="result hidden" aria-live="polite"></section>
</div>
<script>
const questions=[
 {q:'いちばん近い悩みはどれですか？',hint:'今、最も気になるものを1つ選んでください。',key:'issue',options:[
  ['sales','問い合わせや見積もりの対応が遅れる'],['owner','社長に確認しないと仕事が進まない'],['repeat','同じ作業を何度も繰り返している'],['search','情報がバラバラで探すのに時間がかかる'],['money','請求・入金の管理に手間やミスが多い'],['handover','担当者が休むと仕事が止まる'] ]},
 {q:'仕事の中で、負担が大きいのは？',hint:'時間を計算する必要はありません。感覚に近いものを選んでください。',key:'burden',options:[
  ['approval','確認や承認を待つこと'],['search','必要な情報を探すこと'],['input','同じ内容を入力すること'],['status','進捗や最新状況を確認すること'],['report','報告書や資料を作ること'] ]},
 {q:'ミスや漏れは、どのくらい起きますか？',hint:'厳密な回数ではなく、おおよその感覚で大丈夫です。',key:'frequency',options:[
  ['rare','ほとんど起きない'],['monthly','月に1回未満'],['few','月に数回'],['weekly','週に1回以上'],['daily','ほぼ毎日'] ]},
 {q:'このまま半年続くと、どうなりそうですか？',hint:'経営への影響に近いものを選んでください。',key:'impact',options:[
  ['none','特に問題はなさそう'],['load','負担が少し増えそう'],['heavy','かなり負担が増えそう'],['trouble','ミスやトラブルが増えそう'],['slow','成長のスピードが落ちそう'] ]},
 {q:'改善には、いつ取り組みたいですか？',hint:'現在の温度感を教えてください。',key:'timing',options:[
  ['now','すぐにでも取り組みたい'],['soon','できれば早く取り組みたい'],['later','いずれ取り組みたい'],['low','今は優先度が低い'],['no','現時点では予定していない'] ]}
];
const answers={};let current=0;
const steps=document.getElementById('steps'),screens=document.getElementById('screens');
questions.forEach((x,i)=>{steps.insertAdjacentHTML('beforeend',`<span class="step ${i===0?'active':''}">${i+1}</span>`);screens.insertAdjacentHTML('beforeend',`<section class="screen ${i===0?'active':''}" data-i="${i}"><div class="card"><div class="qhead"><span class="num">${i+1}</span><div><h2>${x.q}</h2><p class="hint">${x.hint}</p></div></div><div class="options">${x.options.map(o=>`<label class="option"><input type="radio" name="${x.key}" value="${o[0]}"><span>${o[1]}</span></label>`).join('')}</div><div class="nav">${i?'<button class="btn back" type="button">戻る</button>':''}<button class="btn primary next" type="button" disabled>${i===questions.length-1?'診断結果を見る（無料）':'次へ'}</button></div><p class="privacy">個人情報の入力は不要です</p></div></section>`)});
const screenEls=[...document.querySelectorAll('.screen')],stepEls=[...document.querySelectorAll('.step')];
function show(i){current=i;screenEls.forEach((s,n)=>s.classList.toggle('active',n===i));stepEls.forEach((s,n)=>{s.classList.toggle('active',n===i);s.classList.toggle('done',n<i)});scrollTo({top:0,behavior:'smooth'})}
document.addEventListener('change',e=>{if(!e.target.matches('input[type=radio]'))return;const s=e.target.closest('.screen');s.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));e.target.closest('.option').classList.add('selected');answers[questions[+s.dataset.i].key]=e.target.value;s.querySelector('.next').disabled=false});
document.addEventListener('click',e=>{if(e.target.matches('.back'))show(current-1);if(e.target.matches('.next')){if(current<questions.length-1)show(current+1);else renderResult()}});
const resultMap={
 sales:{title:'見積もり対応の遅れが、',accent:'売上のチャンスを逃している',desc:'問い合わせ後の対応や追客が属人的になり、見込み客が離れている可能性があります。',service:'問い合わせ管理・見積もり後の追客導線'},
 owner:{title:'判断が社長に集中し、',accent:'会社の成長を止めている',desc:'確認待ちが増え、社員も社長も本来の仕事に集中しにくい状態です。',service:'承認ルール・情報共有・役割整理'},
 repeat:{title:'繰り返し作業が積み重なり、',accent:'利益を静かに削っている',desc:'転記や手入力が日常化し、売上を生まない作業に時間を使っている可能性があります。',service:'入力・集計・定型作業の自動化'},
 search:{title:'情報が分散し、',accent:'探す時間が利益を奪っている',desc:'必要な情報がすぐ見つからず、確認とやり直しが増えている状態です。',service:'顧客・案件情報の一元管理'},
 money:{title:'お金の管理が後手になり、',accent:'利益を把握できていない',desc:'請求漏れや入金確認の遅れに加え、案件ごとの採算が見えにくい可能性があります。',service:'請求・入金・案件利益の見える化'},
 handover:{title:'仕事が人に依存し、',accent:'休めない会社になっている',desc:'手順や情報が共有されず、担当者の不在がそのまま業務停止につながっています。',service:'手順書・引き継ぎ・共有基盤づくり'}
};
function estimate(){const f={rare:1,monthly:2,few:5,weekly:9,daily:20}[answers.frequency]||5;const impact={none:.7,load:1,heavy:1.35,trouble:1.5,slow:1.6}[answers.impact]||1;const base={sales:9000,owner:6000,repeat:4500,search:4000,money:5500,handover:5000}[answers.issue]||5000;const low=Math.max(1,Math.round(base*f*impact*.55/10000));const high=Math.max(low+2,Math.round(base*f*impact*1.15/10000));return [low,high]}
function renderResult(){const r=resultMap[answers.issue]||resultMap.repeat;const [lo,hi]=estimate();document.getElementById('quiz').classList.add('hidden');const el=document.getElementById('result');el.classList.remove('hidden');el.innerHTML=`<div class="result-header">診断結果</div><div class="result-card"><div class="eyebrow">あなたの会社のいちばんの課題</div><h2>${r.title}<br><span class="accent">${r.accent}</span>状態です</h2><p class="lead">${r.desc}</p><div class="money"><div class="money-label">1か月あたりの改善余地（概算）</div><div class="money-value">約${lo}〜${hi}<small>万円相当</small></div><div class="money-note">回答内容をもとに、時間・機会損失を簡易換算した目安です。</div></div></div><div class="result-card"><h3 class="simple-title">今、起きている可能性が高いこと</h3><div class="points"><div class="point"><span class="check">✓</span><span>待ち時間や探す時間が積み重なっている</span></div><div class="point"><span class="check">✓</span><span>ミスや漏れが個人の注意力に頼っている</span></div><div class="point"><span class="check">✓</span><span>改善したくても、どこから手を付けるか決めにくい</span></div></div></div><div class="result-card risk"><h3 class="simple-title">このまま放置すると</h3><p>負担だけでなく、対応の遅れ・受注機会の損失・利益率の低下につながるおそれがあります。</p></div><div class="result-card solution"><h3 class="simple-title">最初に確認すべきこと</h3><p><strong>${r.service}</strong>です。高額なシステムを入れる前に、今の業務を見ながら「残す仕事・減らす仕事・仕組みにする仕事」を整理する方が安全です。</p></div><div class="result-card service"><div class="small">最短で成果を出すための第一歩</div><h3>御社だけの改善プランを<br><span class="accent">無料でご提案します</span></h3><p>実際の書類や画面を1つ見ながら、最初に手を付ける場所と費用感を整理します。</p><div class="benefits"><div class="benefit">課題の優先順位がわかる</div><div class="benefit">最初の3つの施策がわかる</div><div class="benefit">効果と費用の目安がわかる</div></div><a class="cta" href="../../#consultation">無料で改善プランを受け取る</a><a class="cta line" href="../../#consultation">LINEで気軽に相談する</a><p class="disclaimer">相談前の売り込みは行いません。診断結果をもとに必要な範囲だけ確認します。</p></div><a class="again" href="./">もう一度診断する</a>`;scrollTo({top:0,behavior:'smooth'})}
</script>
</body>
</html>
