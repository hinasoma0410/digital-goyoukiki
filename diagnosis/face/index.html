<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>1分無料診断｜デジタル御用聞き</title>
<meta name="description" content="4つの質問で、小さな会社の売上・時間・業務の詰まりを診断。改善余地と最初に見直すポイントが1分でわかります。">
<style>
:root{--navy:#07152f;--blue:#315ae8;--orange:#f2610b;--green:#16885f;--ink:#111a2e;--muted:#667289;--line:#dce3ef;--soft:#f4f7fc;--white:#fff;--shadow:0 12px 30px rgba(26,43,82,.09)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#eef2f8;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.65}button,input,select,textarea{font:inherit}.wrap{width:min(720px,100%);margin:auto;min-height:100vh;background:#fff}.hero{padding:24px 18px 20px;text-align:center;color:#fff;background:linear-gradient(135deg,#06132b,#102757)}.brand{font-size:12px;font-weight:800;letter-spacing:.09em;opacity:.9}.hero h1{margin:7px 0 4px;font-size:clamp(28px,7vw,40px);line-height:1.2}.hero p{margin:0;color:#dbe5f7;font-weight:650}.time{display:inline-block;margin-left:7px;padding:3px 9px;border:1px solid #65b7dc;border-radius:999px;background:#0b3858;font-size:12px;vertical-align:middle}.trust{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:12px}.trust span{padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.1);font-size:11px}.progress-wrap{padding:18px 20px 4px}.progress-label{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:7px}.bar{height:7px;border-radius:999px;background:#e8edf5;overflow:hidden}.bar span{display:block;height:100%;width:25%;background:var(--blue);transition:.25s}.screen{display:none;padding:15px 14px 32px}.screen.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:21px;box-shadow:var(--shadow)}.qnum{color:var(--blue);font-size:13px;font-weight:900}.qhead h2{font-size:23px;line-height:1.4;margin:3px 0 5px}.hint{margin:0 0 17px;color:var(--muted);font-size:13px}.options{display:grid;gap:9px}.option{display:flex;align-items:center;gap:11px;min-height:56px;padding:12px 13px;border:2px solid #e3e8f1;border-radius:13px;background:#fff;cursor:pointer;font-weight:700;transition:.15s}.option:hover{border-color:#9bb0f2}.option.selected{border-color:var(--blue);background:#f2f5ff;color:#173bba}.option input{width:18px;height:18px;accent-color:var(--blue);flex:none}.nav{display:flex;gap:9px;margin-top:18px}.btn{border:0;border-radius:12px;padding:14px 16px;font-weight:900;cursor:pointer;text-align:center}.btn.primary{background:var(--blue);color:#fff;flex:1}.btn.back{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn:disabled{opacity:.4;cursor:not-allowed}.privacy{text-align:center;color:#7b8497;font-size:11px;margin:11px 0 0}.result{padding:0 14px 42px;background:#f2f5fa}.result-header{margin:0 -14px;padding:17px;text-align:center;background:var(--navy);color:#fff;font-size:20px;font-weight:900}.result-card{margin-top:14px;background:#fff;border-radius:17px;padding:20px;box-shadow:var(--shadow)}.eyebrow{text-align:center;font-weight:900;color:#a35d08;background:#fff4d7;border-radius:8px;padding:7px}.result h2{text-align:center;font-size:clamp(27px,7vw,37px);line-height:1.34;margin:17px 0 8px}.accent{color:var(--orange)}.lead{text-align:center;color:#505c72;margin:0}.money{margin-top:18px;padding:18px;border:2px solid #ffd29a;border-radius:16px;background:linear-gradient(135deg,#fff,#fff5e7);text-align:center}.money-label{font-weight:900}.money-value{color:var(--orange);font-weight:950;font-size:clamp(36px,10vw,54px);line-height:1.15;margin:3px 0}.money-value small{font-size:18px}.money-note{font-size:11px;color:#7b8497}.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{padding:15px;border:1px solid var(--line);border-radius:14px}.mini b{display:block;margin-bottom:4px}.mini p{margin:0;color:#59667c;font-size:14px}.simple-title{font-size:18px;margin:0 0 10px}.points{display:grid;gap:9px}.point{display:flex;gap:9px;font-size:15px}.check{color:var(--blue);font-weight:900}.service{border:2px solid #ffd39b;background:linear-gradient(145deg,#fffaf2,#fff0d4);text-align:center}.service .small{color:#c15d00;font-weight:900}.service h3{font-size:24px;line-height:1.35;margin:6px 0}.offer{margin:12px 0;padding:12px;border-radius:12px;background:#fff;text-align:left}.offer b{display:block}.offer span{font-size:13px;color:#5d687b}.cta{display:block;width:100%;margin-top:9px;padding:16px 12px;border:0;border-radius:12px;background:var(--orange);color:#fff;text-decoration:none;font-weight:950;font-size:17px;cursor:pointer}.cta.secondary{background:#fff;color:var(--green);border:2px solid var(--green)}.micro{font-size:11px;color:#69758a;margin:9px 0 0}.again{display:block;text-align:center;color:#61708b;margin-top:17px;font-weight:800}.form-wrap{display:none;margin-top:12px;padding:16px;background:#fff;border-radius:14px;text-align:left}.form-wrap.active{display:block}.form-wrap h4{margin:0 0 4px;font-size:18px}.form-wrap p{margin:0 0 12px;color:var(--muted);font-size:13px}.field{margin-top:10px}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:4px}.field input,.field select,.field textarea{width:100%;padding:12px;border:1px solid #cfd7e5;border-radius:10px;background:#fff}.field textarea{min-height:80px;resize:vertical}.required{color:#d43d3d}.success{display:none;padding:18px;border-radius:13px;background:#eefaf4;color:#0b704c;font-weight:800;text-align:center}.success.active{display:block}.disclaimer{font-size:11px;color:#778197;margin-top:10px}.hidden{display:none!important}
@media(max-width:520px){.hero{padding:20px 14px 17px}.hero h1{font-size:28px}.hero p{font-size:13px}.screen{padding:12px 10px 28px}.card{padding:17px 13px;border-radius:15px;box-shadow:none}.qhead h2{font-size:20px}.option{font-size:14px;min-height:54px;padding:11px}.result-card{padding:17px 14px}.result h2{font-size:27px}.mini-grid{grid-template-columns:1fr}.nav{position:sticky;bottom:6px;background:rgba(255,255,255,.95);padding:7px 0}.btn{padding:14px}.money-value{font-size:44px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero"><div class="brand">デジタル御用聞き</div><h1>1分無料診断 <span class="time">4問だけ</span></h1><p>売上や時間を失っている「仕事の詰まり」がわかります</p><div class="trust"><span>個人情報なしで診断</span><span>結果はすぐ表示</span><span>岡山県内対応</span></div></header>
<div id="quiz"><div class="progress-wrap"><div class="progress-label"><span id="progressText">質問 1 / 4</span><span>約1分</span></div><div class="bar"><span id="progressBar"></span></div></div><div id="screens"></div></div>
<section id="result" class="result hidden" aria-live="polite"></section>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbyRz6WNyjBgRvaTq9qHa4EXGlr2YBLoiTIV5vPngGmfQE3IY3mJ1ajBpHnfOv0hyuLxBg/exec';
const API_TOKEN='DIGITAL-GOYOUKIKI-2026';
const questions=[
 {q:'今、いちばん困っていることは？',hint:'最も近いものを1つ選んでください。',key:'issue',options:[['sales','問い合わせ・見積もり・追客が遅れる'],['owner','社長の確認待ちで仕事が止まる'],['repeat','入力・転記・同じ作業が多い'],['search','情報がバラバラで探す・引き継ぐのが大変']]},
 {q:'その問題で、よく起きることは？',hint:'実際に起きている状態で答えてください。',key:'symptom',options:[['customer','お客様を待たせる'],['staff','社長や社員の仕事が止まる'],['redo','やり直しや二度手間が出る'],['miss','連絡・請求・追客が漏れる']]},
 {q:'どのくらいの頻度で起きますか？',hint:'おおよその感覚で大丈夫です。',key:'frequency',options:[['rare','月に1回未満'],['monthly','月に1〜3回'],['weekly','週に1〜2回'],['often','週に3回以上・ほぼ毎日']]},
 {q:'改善するなら、何を優先したい？',hint:'一番近い目的を選んでください。',key:'goal',options:[['sales','売上機会を増やす'],['speed','対応や作業を速くする'],['time','社長・社員の時間を増やす'],['stable','数字や仕事を誰でも把握できるようにする']]}
];
const answers={};let current=0;
const screens=document.getElementById('screens');
questions.forEach((x,i)=>{screens.insertAdjacentHTML('beforeend',`<section class="screen ${i===0?'active':''}" data-i="${i}"><div class="card"><div class="qhead"><div class="qnum">QUESTION ${i+1}</div><h2>${x.q}</h2><p class="hint">${x.hint}</p></div><div class="options">${x.options.map(o=>`<label class="option"><input type="radio" name="${x.key}" value="${o[0]}"><span>${o[1]}</span></label>`).join('')}</div><div class="nav">${i?'<button class="btn back" type="button">戻る</button>':''}<button class="btn primary next" type="button" disabled>${i===questions.length-1?'無料で結果を見る':'次へ'}</button></div><p class="privacy">診断だけなら個人情報の入力はありません</p></div></section>`)});
const screenEls=[...document.querySelectorAll('.screen')];
function track(name,data={}){window.dataLayer=window.dataLayer||[];window.dataLayer.push({event:name,...data})}
function show(i){current=i;screenEls.forEach((s,n)=>s.classList.toggle('active',n===i));document.getElementById('progressText').textContent=`質問 ${i+1} / ${questions.length}`;document.getElementById('progressBar').style.width=`${((i+1)/questions.length)*100}%`;scrollTo({top:0,behavior:'smooth'});track('diagnosis_step',{step:i+1})}
document.addEventListener('change',e=>{if(!e.target.matches('input[type=radio]'))return;const s=e.target.closest('.screen');s.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));e.target.closest('.option').classList.add('selected');answers[questions[+s.dataset.i].key]=e.target.value;s.querySelector('.next').disabled=false});
document.addEventListener('click',e=>{if(e.target.matches('.back'))show(current-1);if(e.target.matches('.next')){if(current<questions.length-1)show(current+1);else renderResult()}if(e.target.matches('[data-open-form]'))openForm(e.target.dataset.intent);if(e.target.id==='restart')location.reload()});
const resultMap={
 sales:{title:'対応の遅れで、',accent:'売上機会を逃している可能性',desc:'問い合わせ・見積もり・追客の流れが人任せになり、検討中のお客様が離れているかもしれません。',first:'問い合わせから次回連絡までを1枚で見える化',service:'顧客・見積もり・追客管理の仕組みづくり'},
 owner:{title:'確認が社長に集中し、',accent:'会社全体の速度が落ちている状態',desc:'社員が判断できず、社長も本来の営業や経営に集中しにくくなっています。',first:'社長確認が必要な仕事と不要な仕事を分ける',service:'承認ルール・役割・情報共有の整理'},
 repeat:{title:'二度手間が積み重なり、',accent:'利益を静かに削っている状態',desc:'転記・集計・定型連絡に時間を使い、売上につながる仕事が後回しになっています。',first:'繰り返している作業を3つだけ洗い出す',service:'入力・集計・連絡業務の自動化'},
 search:{title:'情報が散らばり、',accent:'探す・確認する作業が増えている状態',desc:'顧客情報や案件状況がLINE・紙・Excelに分かれ、判断と対応が遅れています。',first:'顧客・案件情報の保存場所を1つに決める',service:'顧客・案件情報の一元管理'}
};
function estimate(){const f={rare:1,monthly:3,weekly:7,often:16}[answers.frequency]||3;const s={customer:1.3,staff:1.2,redo:1,miss:1.5}[answers.symptom]||1;const g={sales:1.35,speed:1.1,time:1,stable:1.1}[answers.goal]||1;const base=Math.round(f*s*g*6000/10000)*10000;const low=Math.max(30000,Math.round(base*.7/10000)*10000);const high=Math.max(low+30000,Math.round(base*1.4/10000)*10000);return{low,high}}
function yen(n){return new Intl.NumberFormat('ja-JP').format(n)}
function renderResult(){track('diagnosis_complete',{issue:answers.issue});document.getElementById('quiz').classList.add('hidden');const d=resultMap[answers.issue],m=estimate();const result=document.getElementById('result');result.classList.remove('hidden');result.innerHTML=`<div class="result-header">診断結果</div><div class="result-card"><div class="eyebrow">あなたの会社で、最初に確認したい課題</div><h2>${d.title}<br><span class="accent">${d.accent}</span></h2><p class="lead">${d.desc}</p><div class="money"><div class="money-label">1か月あたりの改善余地（簡易推定）</div><div class="money-value"><small>約</small>${yen(m.low/10000)}〜${yen(m.high/10000)}<small>万円相当</small></div><div class="money-note">業務負担と機会損失を回答内容から概算した目安です</div></div></div><div class="result-card"><div class="mini-grid"><div class="mini"><b>まず確認すること</b><p>${d.first}</p></div><div class="mini"><b>相性のよい支援</b><p>${d.service}</p></div></div></div><div class="result-card"><h3 class="simple-title">放置したときに起きやすいこと</h3><div class="points"><div class="point"><span class="check">✓</span><span>対応や判断がさらに遅れる</span></div><div class="point"><span class="check">✓</span><span>売上につながらない作業が増える</span></div><div class="point"><span class="check">✓</span><span>社長や特定の社員への負担が強まる</span></div></div></div><div class="result-card service"><div class="small">診断だけで終わらせないために</div><h3>御社向けの「最初の3手」を<br>無料で整理します</h3><div class="offer"><b>無料改善メモ</b><span>優先課題・最初にやること・合いそうな支援を1枚に整理</span></div><button class="cta" data-open-form data-intent="memo">無料改善メモを受け取る</button><button class="cta secondary" data-open-form data-intent="consultation">15分の無料相談を予約する</button><p class="micro">相談前の売り込みはありません。電話番号は任意です。</p><div id="leadForm" class="form-wrap"><h4 id="formTitle">無料改善メモを受け取る</h4><p>診断結果をもとに、御社向けに内容を整理してご連絡します。</p><form id="contactForm"><input type="hidden" id="intent" value="memo"><div class="field"><label>会社名・屋号 <span class="required">必須</span></label><input id="company" required autocomplete="organization"></div><div class="field"><label>お名前 <span class="required">必須</span></label><input id="name" required autocomplete="name"></div><div class="field"><label>メールアドレス <span class="required">必須</span></label><input id="email" type="email" required autocomplete="email"></div><div class="field"><label>電話番号（任意）</label><input id="phone" type="tel" autocomplete="tel"></div><div class="field"><label>希望する連絡方法</label><select id="contactMethod"><option>メール</option><option>電話</option><option>LINE</option></select></div><div class="field"><label>補足（任意）</label><textarea id="note" placeholder="現在の状況や相談したいこと"></textarea></div><button class="cta" id="submitBtn" type="submit">この内容で送信する</button><p class="disclaimer">入力情報は相談対応のみに使用します。送信により契約が発生することはありません。</p></form><div id="success" class="success">送信しました。内容を確認してご連絡します。</div></div></div><button id="restart" class="again" type="button">もう一度診断する</button>`;scrollTo({top:0,behavior:'smooth'});document.getElementById('contactForm').addEventListener('submit',submitLead)}
function openForm(intent){const box=document.getElementById('leadForm');box.classList.add('active');document.getElementById('intent').value=intent;document.getElementById('formTitle').textContent=intent==='memo'?'無料改善メモを受け取る':'15分の無料相談を申し込む';box.scrollIntoView({behavior:'smooth',block:'start'});track('lead_form_open',{intent})}
async function submitLead(e){e.preventDefault();const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='送信中…';const intent=document.getElementById('intent').value;const payload={action:'createConsultation',token:API_TOKEN,data:{'会社名':document.getElementById('company').value.trim(),'担当者名':document.getElementById('name').value.trim(),'メールアドレス':document.getElementById('email').value.trim(),'電話番号':document.getElementById('phone').value.trim(),'希望連絡方法':document.getElementById('contactMethod').value,'相談内容':document.getElementById('note').value.trim(),'申込種別':intent==='memo'?'無料改善メモ':'15分無料相談','診断タイプ':answers.issue,'診断回答':JSON.stringify(answers),'流入元':'対面営業版診断ツール'}};try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});const j=await r.json();if(!j.success)throw new Error(j.message||'送信に失敗しました');e.target.classList.add('hidden');document.getElementById('success').classList.add('active');track('lead_submit',{intent,issue:answers.issue})}catch(err){alert('送信できませんでした。時間をおいてもう一度お試しください。');btn.disabled=false;btn.textContent='この内容で送信する'}}
track('diagnosis_start');
</script>
</body>
</html>
